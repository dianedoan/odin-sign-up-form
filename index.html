<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign-up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        <div class="left">
            <div class="logo-bar">
                <img src="./images/odin-lined.png" alt="odin-logo">
                <h1>ODIN</h1>
            </div>
            <div class="photo-credit">Photo by <a href="https://unsplash.com/@haliewestphoto" target="_blank">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA" target="_blank">Unsplash</a></div>
        </div>

        <div class="right">
            <header>
                <h2>This is not a real online service! You need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</h2>
                <h2>You <em>know</em> you want to.</h2>
            </header>
            <form action="">
                <h2>Let's do this!</h2>
                <fieldset>
                    <div class="form-row">
                        <div class="form-item">
                            <label for="first_name">FIRST NAME</label>
                            <input type="text" id="first_name">
                        </div>
                        <div class="form-item">
                            <label for="last_name">LAST NAME</label>
                            <input type="text" id="last_name">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-item">
                            <label for="email">EMAIL</label>
                            <input type="email" id="email">
                        </div>
                        <div class="form-item">
                            <label for="phone_number">PHONE NUMBER</label>
                            <input type="number" id="phone_number">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-item">
                            <label for="password">PASSWORD</label>
                            <input type="password" id="password">
                        </div>
                        <div class="form-item">
                            <label for="password">CONFIRM PASSWORD</label>
                            <input type="password" id="password">
                        </div>

                    </div>
                </fieldset>
            </form>
            <button type="submit">Create Account</button>
            <div class="login-link">Already have an account? 
                <a href="">Log in</a>
            </div>
        </div>
    </div>
</body>
</html>
